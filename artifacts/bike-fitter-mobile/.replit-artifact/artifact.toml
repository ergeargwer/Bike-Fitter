kind = "mobile"
previewPath = "/mobile/"
title = "Bike Fitter Mobile"
version = "1.0.0"
id = "artifacts/bike-fitter-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 19299

[services.development]
run = "pnpm --filter @workspace/bike-fitter-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bike-fitter-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/bike-fitter-mobile", "run", "serve" ]

[services.env]
PORT = "19299"
BASE_PATH = "/mobile/"
